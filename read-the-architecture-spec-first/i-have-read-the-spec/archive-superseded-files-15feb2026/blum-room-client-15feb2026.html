<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blum Client — 15 Feb 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0c; --surface: #111115; --surface2: #1a1a20;
    --border: #2a2a33; --border-bright: #3a3a48;
    --text: #d4d4dc; --text-dim: #6a6a78; --text-bright: #eeeeF4;
    --accent: #e8a44a; --accent-dim: rgba(232,164,74,0.12);
    --green: #5cb870; --green-dim: rgba(92,184,112,0.12);
    --blue: #5b8dd9; --blue-dim: rgba(91,141,217,0.12);
    --red: #d45b5b; --red-dim: rgba(212,91,91,0.12);
    --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.5px; }
  header span { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }
  .header-btn { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.12s; }
  .header-btn:hover { background: var(--border); color: var(--text-bright); }
  .header-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .header-btn.ml-auto { margin-left: auto; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--red); transition: background 0.3s; }
  .status-dot.connected { background: var(--green); }

  .main-layout { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  .directory { width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; background: var(--surface); }
  .directory.hidden { display: none; }
  .dir-section { border-bottom: 1px solid var(--border); display: flex; flex-direction: column; }
  .dir-section:last-child { border-bottom: none; flex: 1; }
  .dir-section-header { padding: 8px 12px; font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); background: var(--bg); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .dir-count { background: var(--surface2); padding: 1px 5px; border-radius: 8px; font-size: 8px; }
  .dir-list { overflow-y: auto; padding: 4px; flex: 1; }
  .dir-entry { padding: 5px 8px; border-radius: 3px; margin-bottom: 2px; font-size: 11px; display: flex; align-items: center; gap: 6px; cursor: default; }
  .dir-entry:hover { background: var(--surface2); }
  .dir-entry .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dir-entry .dir-name { font-family: var(--mono); font-weight: 500; font-size: 11px; }
  .dir-entry .dir-uid { font-family: var(--mono); font-size: 7px; color: var(--text-dim); }
  .dir-entry .dir-detail { font-family: var(--mono); font-size: 8px; color: var(--text-dim); }
  .dir-entry .dir-remove { margin-left: auto; font-family: var(--mono); font-size: 9px; cursor: pointer; color: var(--text-dim); border: none; background: none; padding: 0 3px; }
  .dir-entry .dir-remove:hover { color: var(--red); }
  .dir-room-members { padding: 2px 0 4px 20px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
  .dir-room-members .member-row { display: flex; align-items: center; gap: 4px; padding: 1px 0; }
  .dir-room-members .member-row .remove-member { font-size: 8px; cursor: pointer; color: var(--text-dim); border: none; background: none; font-family: var(--mono); padding: 0 2px; }
  .dir-room-members .member-row .remove-member:hover { color: var(--red); }
  .dir-create { padding: 6px 8px; display: flex; gap: 4px; align-items: center; border-top: 1px solid var(--border); flex-shrink: 0; }
  .dir-create input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 4px 6px; color: var(--text-bright); font-family: var(--mono); font-size: 10px; outline: none; min-width: 0; }
  .dir-create input:focus { border-color: var(--accent); }
  .dir-create button { font-family: var(--mono); font-size: 9px; padding: 4px 8px; border-radius: 2px; border: none; background: var(--accent); color: var(--bg); cursor: pointer; flex-shrink: 0; }
  .dir-add-member { padding: 4px 8px 6px; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .dir-add-member select { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 3px 4px; color: var(--text-bright); font-family: var(--mono); font-size: 9px; cursor: pointer; min-width: 0; }
  .dir-add-member button { font-family: var(--mono); font-size: 8px; padding: 3px 6px; border-radius: 2px; border: 1px solid var(--green); background: var(--green-dim); color: var(--green); cursor: pointer; flex-shrink: 0; }
  .dir-add-member button:hover { background: var(--green); color: var(--bg); }

  .grid { flex: 1; display: grid; grid-template-rows: 1fr 1fr; gap: 1px; background: var(--border); overflow: hidden; min-width: 0; }
  .grid-row { display: flex; gap: 1px; min-height: 0; overflow: hidden; }
  .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; min-height: 0; min-width: 0; flex: 1; }
  .panel-header { padding: 5px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .panel-header .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .panel-header .panel-title { font-family: var(--mono); font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-header .panel-uid { font-family: var(--mono); font-size: 7px; color: var(--text-dim); margin-left: auto; flex-shrink: 0; }
  .panel-header .panel-sub { font-family: var(--mono); font-size: 7px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-body { flex: 1; overflow-y: auto; padding: 3px; display: flex; flex-direction: column; gap: 2px; min-height: 0; }
  .panel-body.empty::after { content: attr(data-empty); color: var(--text-dim); font-style: italic; font-size: 9px; padding: 8px; text-align: center; }
  .panel-footer { padding: 2px 6px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 7px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
  .panel.room .panel-header { background: var(--surface); }
  .panel.home .panel-header { background: var(--surface2); }

  .msg { padding: 2px 5px; border-radius: 2px; font-size: 9px; line-height: 1.4; border-left: 2px solid transparent; animation: fadeIn 0.12s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
  .msg .msg-meta { font-family: var(--mono); font-size: 7px; display: flex; gap: 2px; align-items: baseline; margin-bottom: 1px; }
  .msg .msg-from { font-weight: 600; }
  .msg .msg-arrow { color: var(--text-dim); }
  .msg .msg-ts { color: var(--text-dim); margin-left: auto; font-size: 7px; }
  .msg .msg-body { color: var(--text-bright); }
  .msg.withdrawn .msg-body { color: var(--text-dim); font-style: italic; text-decoration: line-through; }
  .msg .msg-quote { border-left: 2px solid var(--border-bright); padding: 1px 4px; margin: 1px 0 2px 0; font-family: var(--mono); font-size: 7px; color: var(--text-dim); font-style: italic; background: rgba(255,255,255,0.02); border-radius: 1px; }
  .msg .msg-quote .quote-from { font-weight: 500; font-style: normal; }
  .msg.error { background: var(--red-dim); border-left-color: var(--red); color: var(--red); }

  .dispatch-batch { padding: 3px 5px; border-radius: 2px; margin-bottom: 2px; animation: fadeIn 0.12s ease; }
  .dispatch-batch.push { background: var(--green-dim); border-left: 2px solid var(--green); }
  .dispatch-batch.pull { background: var(--blue-dim); border-left: 2px solid var(--blue); }
  .dispatch-batch .db-header { font-family: var(--mono); font-size: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .dispatch-batch.push .db-header { color: var(--green); }
  .dispatch-batch.pull .db-header { color: var(--blue); }
  .dispatch-batch .db-meta { font-family: var(--mono); font-size: 7px; color: var(--text-dim); margin-bottom: 2px; }
  .dispatch-batch .db-msg { font-family: var(--mono); font-size: 8px; padding: 2px 3px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text); cursor: pointer; border-radius: 1px; transition: background 0.1s; }
  .dispatch-batch .db-msg:hover { background: rgba(255,255,255,0.04); }
  .dispatch-batch .db-msg:last-child { border-bottom: none; }
  .dispatch-batch .db-msg .db-quote { font-size: 7px; color: var(--text-dim); font-style: italic; padding-left: 4px; border-left: 1px solid var(--border); margin-bottom: 1px; }

  .quote-indicator { display: none; padding: 2px 5px; background: var(--surface2); border-left: 2px solid var(--accent); border-radius: 1px; font-family: var(--mono); font-size: 7px; color: var(--text-dim); align-items: center; gap: 4px; }
  .quote-indicator.active { display: flex; }
  .quote-indicator .quote-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .quote-indicator .quote-clear { cursor: pointer; color: var(--text-dim); border: none; background: none; font-family: var(--mono); font-size: 9px; padding: 0 2px; flex-shrink: 0; }
  .quote-indicator .quote-clear:hover { color: var(--red); }

  .home-input { padding: 4px 5px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; background: var(--surface); }
  .home-input-row { display: flex; gap: 3px; align-items: center; }
  .home-input-row label { font-family: var(--mono); font-size: 7px; color: var(--text-dim); text-transform: uppercase; flex-shrink: 0; }
  .home-input-row select, .home-input-row input { background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 2px 4px; color: var(--text-bright); font-family: var(--mono); font-size: 9px; outline: none; min-width: 0; }
  .home-input-row select { cursor: pointer; }
  .home-input-row input { flex: 1; }
  .home-input-row input:focus, .home-input-row select:focus { border-color: var(--accent); }
  .home-input-row .at-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
  .home-input .home-btns { display: flex; gap: 2px; justify-content: flex-end; }
  .home-input button { font-family: var(--mono); font-size: 8px; font-weight: 500; padding: 2px 6px; border-radius: 2px; border: none; cursor: pointer; transition: all 0.12s; }
  .btn-send { background: var(--accent); color: var(--bg); }
  .btn-send:hover { background: #d4943e; }
  .btn-pull { background: var(--blue-dim); border: 1px solid var(--blue) !important; color: var(--blue); }
  .btn-pull:hover { background: var(--blue); color: var(--bg); }

  .home-status { font-family: var(--mono); font-size: 7px; padding: 1px 4px; border-radius: 2px; flex-shrink: 0; }
  .home-status.online { color: var(--green); background: var(--green-dim); }
  .home-status.offline { color: var(--red); background: var(--red-dim); }
</style>
</head>
<body>

<header>
  <h1>BLUM</h1>
  <div class="status-dot" id="status-dot" title="Disconnected"></div>
  <span id="header-stats">connecting...</span>
  <button class="header-btn" onclick="refreshState()">↻ Refresh</button>
  <button class="header-btn active ml-auto" id="dir-toggle" onclick="toggleDirectory()">Directory</button>
</header>

<div class="main-layout">
  <div class="directory" id="directory">
    <div class="dir-section">
      <div class="dir-section-header">Homes <span class="dir-count" id="participant-count">0</span></div>
      <div class="dir-list" id="participant-list"></div>
      <div class="dir-create">
        <input type="text" id="new-participant-name" placeholder="new participant name" />
        <button onclick="createParticipant()">+ Add</button>
      </div>
    </div>
    <div class="dir-section">
      <div class="dir-section-header">Rooms <span class="dir-count" id="room-count">0</span></div>
      <div class="dir-list" id="room-list"></div>
      <div class="dir-create">
        <input type="text" id="new-room-name" placeholder="new room name" />
        <button onclick="createRoom()">+ Add</button>
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="grid-row" id="rooms-row"></div>
    <div class="grid-row" id="homes-row"></div>
  </div>
</div>

<script>
// ========================================
// SERVER ADDRESSES
// Room server: rooms, directory, messages
// Home servers: each agent's own process
// ========================================

const ROOM_API = 'http://localhost:3141/api';

// State from room server
let rooms = {};
let directoryEntries = {}; // name → { name, uid, endpoint, color }

// State from home servers
let homeStates = {};    // name → { dispatches, ... }
let homeOnline = {};    // name → bool

const quoteState = {};
let lastHash = '';

// ========================================
// API HELPERS
// ========================================

async function roomApi(endpoint, body) {
  try {
    const opts = body
      ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      : { method: 'GET' };
    const res = await fetch(ROOM_API + endpoint, opts);
    return await res.json();
  } catch { return { error: 'Room server unreachable' }; }
}

async function homeApi(name, endpoint, body) {
  const entry = directoryEntries[name];
  if (!entry) return { error: `${name} not in directory` };
  try {
    const url = entry.endpoint + endpoint;
    const opts = body
      ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      : { method: 'GET' };
    const res = await fetch(url, opts);
    return await res.json();
  } catch { return { error: `${name}'s home unreachable` }; }
}

// ========================================
// STATE FETCHING
// ========================================

async function fetchState() {
  // 1. Room server state (rooms + directory)
  const data = await roomApi('/state');
  if (data.error) { setConnected(false); return false; }

  rooms = data.rooms || {};
  directoryEntries = data.directory || {};
  setConnected(true);

  // 2. Each home's dispatches (in parallel)
  const names = Object.keys(directoryEntries);
  const results = await Promise.allSettled(
    names.map(async name => {
      const entry = directoryEntries[name];
      try {
        const res = await fetch(entry.endpoint + '/dispatches');
        if (!res.ok) throw new Error(res.status);
        const dispatches = await res.json();
        homeStates[name] = { dispatches };
        homeOnline[name] = true;
      } catch {
        homeOnline[name] = false;
        if (!homeStates[name]) homeStates[name] = { dispatches: [] };
      }
    })
  );

  // Init quote state
  for (const name of names) {
    if (!(name in quoteState)) quoteState[name] = null;
  }

  const hash = JSON.stringify({ rooms, directoryEntries, homeStates });
  if (hash !== lastHash) {
    lastHash = hash;
    renderAll();
  }
  return true;
}

async function refreshState() { await fetchState(); }

function setConnected(c) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (c ? ' connected' : '');
  dot.title = c ? 'Room server connected' : 'Disconnected';
}

// Polling
let pollTimer = null;
function startPolling() { if (pollTimer) clearInterval(pollTimer); pollTimer = setInterval(fetchState, 2000); fetchState(); }

// ========================================
// RENDER HELPERS
// ========================================

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function ts(iso) { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
function pColor(name) { return directoryEntries[name]?.color?.hex || 'var(--text)'; }

// ========================================
// RENDER
// ========================================

function renderAll() {
  renderDirectory();
  rebuildGrid();
}

function renderDirectory() {
  const pList = document.getElementById('participant-list');
  const names = Object.keys(directoryEntries);
  document.getElementById('participant-count').textContent = names.length;
  pList.innerHTML = '';

  for (const [name, entry] of Object.entries(directoryEntries)) {
    const memberOf = Object.keys(rooms).filter(r => rooms[r].participants.includes(name));
    const online = homeOnline[name];
    const div = document.createElement('div');
    div.className = 'dir-entry';
    div.innerHTML =
      `<div class="dot" style="background:${entry.color?.hex || 'var(--text)'}"></div>` +
      `<div><div class="dir-name" style="color:${entry.color?.hex || 'var(--text)'}">${name}</div>` +
      `<div class="dir-detail">${entry.endpoint} · rooms: ${memberOf.length > 0 ? memberOf.join(', ') : 'none'}</div></div>` +
      `<span class="home-status ${online ? 'online' : 'offline'}">${online ? 'on' : 'off'}</span>` +
      `<span class="dir-uid">${entry.uid}</span>`;
    pList.appendChild(div);
  }

  const rList = document.getElementById('room-list');
  document.getElementById('room-count').textContent = Object.keys(rooms).length;
  rList.innerHTML = '';

  for (const [name, r] of Object.entries(rooms)) {
    const wrapper = document.createElement('div');
    const div = document.createElement('div');
    div.className = 'dir-entry';
    div.innerHTML =
      `<span style="font-size:9px">${r.archived ? '🔒' : '◻'}</span>` +
      `<div><div class="dir-name" style="color:var(--text-bright)">${name}</div>` +
      `<div class="dir-detail">${r.participants.length} members · ${r.transcript.length} msg</div></div>` +
      `<span class="dir-uid">${r.uid}</span>`;
    wrapper.appendChild(div);

    if (r.participants.length > 0) {
      const members = document.createElement('div');
      members.className = 'dir-room-members';
      for (const pName of r.participants) {
        const row = document.createElement('div');
        row.className = 'member-row';
        row.innerHTML =
          `<span style="color:${pColor(pName)}">${pName}</span>` +
          `<button class="remove-member" onclick="doLeaveRoom('${pName}','${name}')" title="Remove">×</button>`;
        members.appendChild(row);
      }
      wrapper.appendChild(members);
    }

    const nonMembers = Object.keys(directoryEntries).filter(p => !r.participants.includes(p));
    if (nonMembers.length > 0 && !r.archived) {
      const addDiv = document.createElement('div');
      addDiv.className = 'dir-add-member';
      addDiv.innerHTML =
        `<select id="add-to-${name}">${nonMembers.map(p => `<option value="${p}">${p}</option>`).join('')}</select>` +
        `<button onclick="doJoinRoom('${name}')">+ Join</button>`;
      wrapper.appendChild(addDiv);
    }
    rList.appendChild(wrapper);
  }

  const pCount = Object.keys(directoryEntries).length;
  const rCount = Object.keys(rooms).length;
  const onCount = Object.values(homeOnline).filter(Boolean).length;
  document.getElementById('header-stats').textContent =
    `${pCount} home${pCount !== 1 ? 's' : ''} (${onCount} online) · ${rCount} room${rCount !== 1 ? 's' : ''}`;
}

function rebuildGrid() {
  const roomsRow = document.getElementById('rooms-row');
  const homesRow = document.getElementById('homes-row');
  roomsRow.innerHTML = '';
  homesRow.innerHTML = '';

  const roomNames = Object.keys(rooms);
  const agentNames = Object.keys(directoryEntries);

  // Room panels
  for (const name of roomNames) {
    const room = rooms[name];
    const panel = document.createElement('div');
    panel.className = 'panel room';
    panel.innerHTML =
      `<div class="panel-header">` +
        `<span style="font-size:9px">${room.archived ? '🔒' : '◻'}</span>` +
        `<div style="min-width:0"><div class="panel-title" style="color:var(--text-bright)">${name}</div>` +
        `<div class="panel-sub">${room.participants.join(', ')}</div></div>` +
        `<span class="panel-uid">${room.uid}</span>` +
      `</div>` +
      `<div class="panel-body${room.transcript.length === 0 ? ' empty' : ''}" data-empty="No messages" id="rb-${name}"></div>` +
      `<div class="panel-footer" id="rf-${name}"></div>`;
    roomsRow.appendChild(panel);
    renderRoomMessages(name);
  }
  if (roomNames.length === 0) roomsRow.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-style:italic;font-size:11px;background:var(--bg)">No rooms</div>';

  // Home panels
  for (const name of agentNames) {
    const entry = directoryEntries[name];
    const online = homeOnline[name];
    const agentRooms = roomNames.filter(r => rooms[r].participants.includes(name));
    const others = agentNames.filter(p => p !== name);
    const dispatches = homeStates[name]?.dispatches || [];

    const toOpts = `<option value="broadcast">bcast</option>` + others.map(p => `<option value="${p}">${p}</option>`).join('');
    const roomOpts = agentRooms.length > 0 ? agentRooms.map(r => `<option value="${r}">${r}</option>`).join('') : `<option value="" disabled>no rooms</option>`;

    const panel = document.createElement('div');
    panel.className = 'panel home';
    panel.innerHTML =
      `<div class="panel-header">` +
        `<div class="dot" style="background:${entry.color?.hex || 'var(--text)'}"></div>` +
        `<div style="min-width:0"><div class="panel-title" style="color:${entry.color?.hex || 'var(--text)'}">${name}'s home</div>` +
        `<div class="panel-sub">${agentRooms.join(', ') || 'no rooms'}</div></div>` +
        `<span class="home-status ${online ? 'online' : 'offline'}">${online ? '●' : '○'}</span>` +
        `<span class="panel-uid">${entry.uid}</span>` +
      `</div>` +
      `<div class="panel-body${dispatches.length === 0 ? ' empty' : ''}" data-empty="No dispatches" id="hb-${name}"></div>` +
      `<div class="home-input">` +
        `<div class="quote-indicator" id="h-quote-${name}"></div>` +
        `<div class="home-input-row">` +
          `<label>to</label><select id="h-to-${name}">${toOpts}</select>` +
          `<span class="at-label">@</span><select id="h-room-${name}">${roomOpts}</select>` +
          `<input type="text" id="h-body-${name}" placeholder="message..." />` +
        `</div>` +
        `<div class="home-btns">` +
          `<select id="h-pull-${name}" style="font-family:var(--mono);font-size:8px;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:2px 3px;color:var(--text);cursor:pointer;">${roomOpts}</select>` +
          `<button class="btn-pull" onclick="doPull('${name}')">Pull</button>` +
          `<button class="btn-send" onclick="doSend('${name}')">Send</button>` +
        `</div>` +
      `</div>` +
      `<div class="panel-footer" id="hf-${name}"></div>`;
    homesRow.appendChild(panel);
    renderHomeDispatches(name);
    setTimeout(() => {
      const input = document.getElementById('h-body-' + name);
      if (input) input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(name); });
    }, 0);
  }
  if (agentNames.length === 0) homesRow.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-style:italic;font-size:11px;background:var(--bg)">No homes</div>';
}

function renderRoomMessages(name) {
  const room = rooms[name];
  const body = document.getElementById('rb-' + name);
  const footer = document.getElementById('rf-' + name);
  if (!body) return;
  body.innerHTML = '';
  body.className = 'panel-body' + (room.transcript.length === 0 ? ' empty' : '');
  body.setAttribute('data-empty', 'No messages');

  for (const msg of room.transcript) {
    const div = document.createElement('div');
    div.style.borderLeftColor = pColor(msg.from);
    div.className = 'msg' + (msg.withdrawn ? ' withdrawn' : '');
    const toStr = msg.to ? `<span class="msg-arrow">→</span> <span style="color:${pColor(msg.to)}">${msg.toAddress}</span>` : `<span class="msg-arrow">→ broadcast</span>`;
    let qh = '';
    if (msg.replyTo) qh = `<div class="msg-quote"><span class="quote-from" style="color:${pColor(msg.quoteFrom)}">${msg.quoteFrom}</span>: ${esc(msg.quoteBody)}</div>`;
    div.innerHTML = `<div class="msg-meta"><span class="msg-from" style="color:${pColor(msg.from)}">${msg.fromAddress}</span>${toStr}<span class="msg-ts">${ts(msg.ts)}</span></div>${qh}<div class="msg-body">${msg.withdrawn ? '[withdrawn]' : esc(msg.body)}</div>`;
    body.appendChild(div);
  }
  body.scrollTop = body.scrollHeight;
  if (footer) footer.textContent = room.transcript.length + ' msg · ' + room.participants.join(', ');
}

function renderHomeDispatches(name) {
  const dispatches = homeStates[name]?.dispatches || [];
  const body = document.getElementById('hb-' + name);
  const footer = document.getElementById('hf-' + name);
  if (!body) return;
  const agentRooms = Object.keys(rooms).filter(r => rooms[r].participants.includes(name));
  body.innerHTML = '';
  body.className = 'panel-body' + (dispatches.length === 0 ? ' empty' : '');
  body.setAttribute('data-empty', 'No dispatches');

  for (const d of dispatches) {
    const div = document.createElement('div');
    div.className = 'dispatch-batch ' + d.type;
    let msgsHtml = '';
    if (!d.messages || d.messages.length === 0) {
      msgsHtml = '<div style="color:var(--text-dim);font-style:italic;font-size:7px">empty</div>';
    } else {
      msgsHtml = d.messages.map(m => {
        const toStr = m.to ? ' → ' + m.to : '';
        let qh = '';
        if (m.replyTo) qh = `<div class="db-quote">${m.quoteFrom}: ${esc(m.quoteBody)}</div>`;
        const escaped = esc(m.body).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        return `<div class="db-msg" onclick="setQuote('${name}','${m.id}','${m.from}','${escaped}','${m.room}')" title="Click to quote-reply">${qh}<span style="color:${pColor(m.from)}">${m.from}${toStr}</span>: ${m.withdrawn ? '<i>[withdrawn]</i>' : esc(m.body)}</div>`;
      }).join('');
    }
    div.innerHTML = `<div class="db-header">${d.type.toUpperCase()} from ${d.room} (${d.messageCount} msg)</div><div class="db-meta">${d.roomUID} · ${ts(d.ts)}</div>${msgsHtml}`;
    body.appendChild(div);
  }
  body.scrollTop = body.scrollHeight;
  if (footer) footer.textContent = dispatches.length + ' dispatches · ' + agentRooms.join(', ');
  renderQuoteIndicator(name);
}

// ========================================
// QUOTE STATE
// ========================================

function setQuote(h, id, from, body, room) { quoteState[h] = { msgId: id, from, body, room }; renderQuoteIndicator(h); }
function clearQuote(h) { quoteState[h] = null; renderQuoteIndicator(h); }
function renderQuoteIndicator(h) {
  const el = document.getElementById('h-quote-' + h);
  if (!el) return;
  const q = quoteState[h];
  if (q) {
    el.className = 'quote-indicator active';
    const t = q.body.length > 60 ? q.body.substring(0, 60) + '…' : q.body;
    el.innerHTML = `<span class="quote-text">↩ <span style="color:${pColor(q.from)}">${q.from}</span>: ${t}</span><button class="quote-clear" onclick="clearQuote('${h}')" title="Clear">×</button>`;
  } else { el.className = 'quote-indicator'; el.innerHTML = ''; }
}

// ========================================
// ACTIONS — routed to the right server
// ========================================

// Send goes to the HOME server (home sends through room)
async function doSend(fromName) {
  const toEl = document.getElementById('h-to-' + fromName);
  const roomEl = document.getElementById('h-room-' + fromName);
  const bodyEl = document.getElementById('h-body-' + fromName);
  if (!toEl || !roomEl || !bodyEl) return;
  const to = toEl.value;
  const room = roomEl.value;
  const body = bodyEl.value.trim();
  if (!body || !room) return;

  const payload = { to: to === 'broadcast' ? null : to, room, body };
  if (quoteState[fromName]) payload.replyTo = quoteState[fromName].msgId;

  const result = await homeApi(fromName, '/send', payload);
  if (result.error) showError(fromName, result.error);
  else clearQuote(fromName);

  bodyEl.value = '';
  bodyEl.focus();
  await fetchState();
}

// Pull goes to the HOME server (home pulls from room)
async function doPull(agentName) {
  const roomEl = document.getElementById('h-pull-' + agentName);
  if (!roomEl || !roomEl.value) return;
  const result = await homeApi(agentName, '/pull', { room: roomEl.value });
  if (result.error) showError(agentName, result.error);
  await fetchState();
}

// Room operations go to the ROOM server
async function createRoom() {
  const input = document.getElementById('new-room-name');
  const name = input.value.trim();
  if (!name) return;
  const result = await roomApi('/room/create', { name });
  if (result.error) alert(result.error);
  input.value = '';
  await fetchState();
}

async function doJoinRoom(roomName) {
  const select = document.getElementById('add-to-' + roomName);
  if (!select) return;
  await roomApi('/room/join', { participant: select.value, room: roomName });
  await fetchState();
}

async function doLeaveRoom(participant, roomName) {
  await roomApi('/room/leave', { participant, room: roomName });
  await fetchState();
}

// Creating a participant means starting a new home server — for now just note it
async function createParticipant() {
  const input = document.getElementById('new-participant-name');
  const name = input.value.trim();
  if (!name) return;
  alert('To add a new participant, start a home server:\n\nnode blum-home-server.js ' + name.toLowerCase() + ' <port>\n\nThe home will register itself with the room server.');
  input.value = '';
}

function showError(homeName, msg) {
  const hb = document.getElementById('hb-' + homeName);
  if (!hb) return;
  const div = document.createElement('div');
  div.className = 'msg error';
  div.innerHTML = `<div class="msg-body">${esc(msg)}</div>`;
  hb.appendChild(div);
  hb.scrollTop = hb.scrollHeight;
}

function toggleDirectory() {
  document.getElementById('directory').classList.toggle('hidden');
  document.getElementById('dir-toggle').classList.toggle('active');
}

document.getElementById('new-participant-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') createParticipant(); });
document.getElementById('new-room-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') createRoom(); });

// ========================================
// INIT
// ========================================
startPolling();
</script>
</body>
