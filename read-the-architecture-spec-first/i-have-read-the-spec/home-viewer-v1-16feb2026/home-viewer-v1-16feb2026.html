<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Viewer — Blum</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #0a0a0c; --surface: #111115; --surface2: #1a1a20;
    --border: #2a2a33; --border-bright: #3a3a48;
    --text: #d4d4dc; --text-dim: #6a6a78; --text-bright: #eeeeF4;
    --accent: #e8a44a; --accent-dim: rgba(232,164,74,0.12);
    --green: #5cb870; --green-dim: rgba(92,184,112,0.12);
    --blue: #5b8dd9; --blue-dim: rgba(91,141,217,0.12);
    --red: #d45b5b; --red-dim: rgba(212,91,91,0.12);
    --purple: #a078cc; --purple-dim: rgba(160,120,204,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.5px; }
  .header-input { font-family: var(--mono); font-size: 10px; padding: 4px 8px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); outline: none; }
  .header-input:focus { border-color: var(--accent); }
  .header-btn { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }
  .header-btn:hover { background: var(--border); color: var(--text-bright); }
  .header-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .status-dot.on { background: var(--green); }
  .status-dot.off { background: var(--red); }

  /* ── Identity bar ── */
  .identity { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
  .identity .agent-name { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--accent); }
  .identity .meta { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
  .identity .meta span { margin-right: 16px; }
  .identity .meta .val { color: var(--text); }
  .identity .badge { font-family: var(--mono); font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.processing { background: var(--accent-dim); color: var(--accent); }
  .badge.idle { background: var(--green-dim); color: var(--green); }
  .badge.offline { background: var(--red-dim); color: var(--red); }

  /* ── Tabs ── */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .tab { font-family: var(--mono); font-size: 10px; padding: 6px 14px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.12s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .tab-count { font-size: 8px; background: var(--surface2); padding: 1px 4px; border-radius: 6px; margin-left: 4px; }

  /* ── Panel area ── */
  .panel-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-content { flex: 1; overflow-y: auto; padding: 8px; }

  /* ── Ops tab ── */
  .op-entry { font-family: var(--mono); font-size: 9px; line-height: 1.6; padding: 1px 4px; border-radius: 2px; }
  .op-entry:hover { background: var(--surface2); }
  .op-entry .op-ts { color: var(--text-dim); margin-right: 8px; font-size: 8px; }
  .op-entry .op-type { font-weight: 600; margin-right: 6px; }
  .op-entry .op-detail { color: var(--text-dim); }
  .op-type-home { color: var(--accent); }
  .op-type-server { color: var(--blue); }
  .op-type-membership { color: var(--green); }
  .op-type-queue { color: var(--purple); }
  .op-type-process { color: var(--accent); }
  .op-type-route { color: var(--blue); }
  .op-type-block { color: var(--red); }

  /* ── History tab ── */
  .history-room-select { padding: 6px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .history-room-select label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
  .history-room-select select { background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 3px 6px; color: var(--text-bright); font-family: var(--mono); font-size: 10px; cursor: pointer; }
  .hist-msg { padding: 4px 6px; border-radius: 2px; font-size: 10px; line-height: 1.5; border-left: 2px solid var(--border); margin-bottom: 4px; }
  .hist-msg .hist-meta { font-family: var(--mono); font-size: 8px; color: var(--text-dim); display: flex; gap: 6px; margin-bottom: 2px; }
  .hist-msg .hist-role { font-weight: 600; }
  .hist-msg .hist-body { color: var(--text-bright); white-space: pre-wrap; font-size: 13px; line-height: 1.65; }
  .hist-msg.system { border-left-color: var(--accent); }
  .hist-msg.user { border-left-color: var(--blue); }
  .hist-msg.assistant { border-left-color: var(--green); }

  /* ── Config tab ── */
  .config-table { width: 100%; border-collapse: collapse; }
  .config-table td { font-family: var(--mono); font-size: 10px; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .config-table td:first-child { color: var(--text-dim); width: 140px; font-size: 9px; text-transform: uppercase; }
  .config-table td:last-child { color: var(--text-bright); word-break: break-all; }

  /* ── Transcript tab ── */
  .transcript-layout { display: flex; flex: 1; overflow: hidden; }
  .transcript-list { width: 320px; min-width: 260px; border-right: 1px solid var(--border); overflow-y: scroll; flex-shrink: 0; height: 100%; }
  .transcript-detail { flex: 1; overflow-y: auto; padding: 12px; }

  .tx-entry { padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .tx-entry:hover { background: var(--surface2); }
  .tx-entry.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); }
  .tx-entry .tx-time { font-family: var(--mono); font-size: 7px; color: var(--text-dim); }
  .tx-entry .tx-room { font-family: var(--mono); font-size: 8px; color: var(--blue); font-weight: 500; }
  .tx-entry .tx-summary { font-family: var(--mono); font-size: 8px; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-entry .tx-tokens { font-family: var(--mono); font-size: 7px; color: var(--text-dim); margin-top: 2px; }
  .tx-entry .tx-tokens .tok-in { color: var(--purple); }
  .tx-entry .tx-tokens .tok-out { color: var(--green); }

  /* Detail panel sections */
  .detail-section { margin-bottom: 16px; }
  .detail-section-header { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 0; border-bottom: 1px solid var(--border); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .detail-section-header .section-badge { font-size: 8px; font-weight: 400; padding: 1px 5px; border-radius: 3px; text-transform: none; letter-spacing: 0; }

  .ctx-msg { padding: 6px 8px; margin-bottom: 4px; border-radius: 3px; border-left: 2px solid var(--border); background: var(--surface); }
  .ctx-msg.collapsed .ctx-full { display: none; }
  .ctx-msg .ctx-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .ctx-msg .ctx-index { font-family: var(--mono); font-size: 8px; color: var(--text-dim); min-width: 18px; }
  .ctx-msg .ctx-role { font-family: var(--mono); font-size: 9px; font-weight: 600; }
  .ctx-msg .ctx-role.system { color: var(--accent); }
  .ctx-msg .ctx-role.user { color: var(--blue); }
  .ctx-msg .ctx-role.assistant { color: var(--green); }
  .ctx-msg .ctx-tokens { font-family: var(--mono); font-size: 8px; color: var(--purple); }
  .ctx-msg .ctx-preview { font-family: var(--mono); font-size: 8px; color: var(--text-dim); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctx-msg .ctx-full { font-family: var(--mono); font-size: 11px; color: var(--text-bright); white-space: pre-wrap; word-break: break-word; margin-top: 6px; padding: 6px 8px; background: var(--bg); border-radius: 2px; max-height: 400px; overflow-y: auto; line-height: 1.6; }

  .out-block { padding: 6px 8px; margin-bottom: 4px; border-radius: 3px; background: var(--surface); font-family: var(--mono); font-size: 9px; line-height: 1.5; }
  .out-block .out-label { font-size: 8px; font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }
  .out-block .out-body { color: var(--text-bright); white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.65; }
  .out-block.thinking { border-left: 2px solid var(--purple); }
  .out-block.thinking .out-label { color: var(--purple); }
  .out-block.message { border-left: 2px solid var(--green); }
  .out-block.message .out-label { color: var(--green); }
  .out-block.message .out-to { color: var(--blue); font-weight: 500; }
  .out-block.private { border-left: 2px solid var(--text-dim); }
  .out-block.private .out-label { color: var(--text-dim); }

  .route-entry { font-family: var(--mono); font-size: 9px; padding: 3px 8px; color: var(--text-dim); }
  .route-entry .route-to { color: var(--blue); }
  .route-entry .route-type { color: var(--green); font-weight: 500; }

  .empty-state { padding: 32px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 10px; font-style: italic; }

  /* ── Send Bar ── */
  .send-bar { display: none; flex-shrink: 0; border-top: 1px solid var(--border); background: var(--surface); padding: 6px 12px; gap: 8px; align-items: center; flex-wrap: wrap; }
  .send-bar.visible { display: flex; }
  .send-bar label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .send-bar select { font-family: var(--mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; color: var(--text-bright); cursor: pointer; min-width: 120px; }
  .send-bar select:focus { outline: none; border-color: var(--accent); }
  .send-bar input[type=text] { font-family: var(--mono); font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 10px; color: var(--text-bright); flex: 1; min-width: 200px; outline: none; }
  .send-bar input[type=text]:focus { border-color: var(--accent); }
  .send-bar input::placeholder { color: var(--text-dim); }
  .send-bar button { font-family: var(--mono); font-size: 10px; padding: 4px 14px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; white-space: nowrap; }
  .send-bar button:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .send-bar button.sending { opacity: 0.6; pointer-events: none; }
  .send-bar .send-status { font-family: var(--mono); font-size: 9px; color: var(--green); }
  .send-bar .send-error { font-family: var(--mono); font-size: 9px; color: var(--red); }

  /* ── Op Popout ── */
  .op-entry { cursor: pointer; }
  #op-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; }
  #op-backdrop.visible { display: block; }
  #op-popout {
    display: none; position: fixed; z-index: 1001;
    width: 480px; max-width: calc(100vw - 32px);
    max-height: calc(100vh - 64px);
    background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    overflow: hidden; flex-direction: column;
  }
  #op-popout.visible { display: flex; }
  #op-popout-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #op-popout-type { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  #op-popout-ts { font-family: var(--mono); font-size: 9px; color: var(--text-dim); flex: 1; }
  #op-popout-close { background: none; border: none; color: var(--text-dim); font-size: 16px; line-height: 1; cursor: pointer; padding: 0 2px; margin-left: auto; }
  #op-popout-close:hover { color: var(--text-bright); }
  #op-popout-body { overflow-y: auto; padding: 12px 14px; flex: 1; }
  .popout-section { margin-bottom: 14px; }
  .popout-section-header { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 6px; }
  .popout-field-table { width: 100%; border-collapse: collapse; }
  .popout-field-table td { font-family: var(--mono); font-size: 10px; padding: 2px 4px; vertical-align: top; }
  .popout-field-table td:first-child { color: var(--text-dim); width: 110px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
  .popout-field-table td:last-child { color: var(--text-bright); word-break: break-all; }
  .popout-field-table td:last-child.highlight-red { color: var(--red); }
  .popout-field-table td:last-child.highlight-blue { color: var(--blue); }
  .popout-field-table td:last-child.highlight-accent { color: var(--accent); }
  .popout-expand-btn {
    font-family: var(--mono); font-size: 9px; color: var(--blue);
    background: none; border: 1px solid var(--border); border-radius: 3px;
    padding: 3px 8px; cursor: pointer; margin-top: 6px;
  }
  .popout-expand-btn:hover { background: var(--blue-dim); border-color: var(--blue); }
  .popout-cycle-detail { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
<header>
  <h1>HOME VIEWER</h1>
  <span style="margin-left:auto">
    <span class="status-dot off" id="status-dot"></span>
    <span id="status-label" style="font-family:var(--mono);font-size:9px;color:var(--text-dim)">offline</span>
  </span>
  <label style="font-family:var(--mono);font-size:9px;color:var(--text-dim)">Home</label>
  <input class="header-input" id="home-url" value="http://localhost:4110" style="width:200px" />
  <button class="header-btn" id="connect-btn" onclick="doConnect()">Connect</button>
</header>
<div class="identity" id="identity" style="display:none">
  <div>
    <div class="agent-name" id="id-name">-</div>
    <div class="meta">
      <span>uid <span class="val" id="id-uid">-</span></span>
      <span>model <span class="val" id="id-model">-</span></span>
      <span>rooms <span class="val" id="id-rooms">-</span></span>
    </div>
  </div>
  <span class="badge idle" id="id-badge">idle</span>
</div>
<div class="tab-bar">
  <div class="tab active" data-tab="ops" onclick="switchTab('ops')">Operations<span class="tab-count" id="ops-count">0</span></div>
  <div class="tab" data-tab="transcript" onclick="switchTab('transcript')">Inference Log<span class="tab-count" id="transcript-count">0</span></div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">History<span class="tab-count" id="history-count">0</span></div>
  <div class="tab" data-tab="config" onclick="switchTab('config')">Config</div>
</div>
<div class="panel-area">
  <!-- Ops -->
  <div class="panel-content" id="tab-ops"></div>

  <!-- Transcript (new) -->
  <div id="tab-transcript" style="display:none;flex:1;overflow:hidden">
    <div class="transcript-layout">
      <div class="transcript-list" id="transcript-list"></div>
      <div class="transcript-detail" id="transcript-detail">
        <div class="empty-state">Select an inference cycle to inspect</div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div id="tab-history" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div class="history-room-select">
      <label>Room</label>
      <select id="history-room" onchange="fetchHistory()"></select>
      <span style="font-family:var(--mono);font-size:8px;color:var(--text-dim)" id="history-msg-count"></span>
    </div>
    <div class="panel-content" id="history-body"></div>
  </div>

  <!-- Config -->
  <div class="panel-content" id="tab-config" style="display:none"></div>
</div>
<!-- Send Bar -->
<div class="send-bar" id="send-bar">
  <label>To</label>
  <select id="send-to">
    <option value="broadcast@boardroom">broadcast (all)</option>
  </select>
  <input type="text" id="send-text" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend()}" />
  <button onclick="doSend()" id="send-btn">Send</button>
  <span id="send-status"></span>
</div>

<!-- Op Popout -->
<div id="op-backdrop"></div>
<div id="op-popout">
  <div id="op-popout-header">
    <span id="op-popout-type"></span>
    <span id="op-popout-ts"></span>
    <button id="op-popout-close" onclick="closeOpPopout()" title="Close">×</button>
  </div>
  <div id="op-popout-body"></div>
</div>

<script>
let homeUrl = null, connected = false, pollTimer = null, currentTab = 'ops';
let lastOpsCount = 0, homeConfig = null, homeStatus = null;
let transcriptData = [], lastTranscriptCount = 0, selectedTxIndex = -1;

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
async function api(path) { const r = await fetch(homeUrl + path); return r.json(); }

// ── Op Line Parser ──
function parseOpLine(line) {
  if (!line) return null;
  // Format: TIMESTAMP TYPE key=value key=value ...
  const firstSpace = line.indexOf(' ');
  if (firstSpace === -1) return { ts: line, type: '', category: '', fields: {} };
  const ts = line.slice(0, firstSpace);
  const rest = line.slice(firstSpace + 1).trimStart();

  // Next token before space is the TYPE
  const secondSpace = rest.indexOf(' ');
  const type = secondSpace !== -1 ? rest.slice(0, secondSpace) : rest;
  const fieldsStr = secondSpace !== -1 ? rest.slice(secondSpace + 1).trimStart() : '';
  const category = type.split(':')[0];

  // Parse key=value pairs; values may contain '=' so split on first '=' only per token
  // Tokens are space-separated BUT values may have spaces if quoted — we do best-effort
  // Strategy: scan left-to-right, find `word=` patterns as key starts
  const fields = {};
  // Regex: capture key= then everything up to next key= or end
  const re = /(\w[\w.-]*)=([^\s]*(?:\s+(?![\w.-]+=)[^\s]*)*)/g;
  let m;
  while ((m = re.exec(fieldsStr)) !== null) {
    fields[m[1]] = m[2].trim();
  }

  return { ts, type, category, fields, raw: line };
}

// ── Op Popout ──
function closeOpPopout() {
  document.getElementById('op-popout').classList.remove('visible');
  document.getElementById('op-backdrop').classList.remove('visible');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('op-backdrop').addEventListener('click', closeOpPopout);
});

function showOpPopout(parsedOp, anchorEl) {
  if (!parsedOp) return;
  const { ts, type, category, fields } = parsedOp;

  // ── Header ──
  const typeEl = document.getElementById('op-popout-type');
  typeEl.textContent = type || '?';
  const typeColorMap = {
    home: 'background:var(--accent-dim);color:var(--accent)',
    server: 'background:var(--blue-dim);color:var(--blue)',
    membership: 'background:var(--green-dim);color:var(--green)',
    queue: 'background:var(--purple-dim);color:var(--purple)',
    process: 'background:var(--accent-dim);color:var(--accent)',
    route: 'background:var(--blue-dim);color:var(--blue)',
    block: 'background:var(--red-dim);color:var(--red)',
    tool: 'background:var(--purple-dim);color:var(--purple)',
  };
  typeEl.setAttribute('style', typeColorMap[category] || 'background:var(--surface2);color:var(--text)');

  const time = ts ? new Date(ts).toLocaleString() : '?';
  document.getElementById('op-popout-ts').textContent = time;

  // ── Body ──
  const body = document.getElementById('op-popout-body');
  let html = '';

  // All fields table
  const fieldKeys = Object.keys(fields);
  if (fieldKeys.length > 0) {
    html += '<div class="popout-section">';
    html += '<div class="popout-section-header">Fields</div>';
    html += '<table class="popout-field-table">';
    for (const [k, v] of Object.entries(fields)) {
      let cls = '';
      if (k === 'error') cls = 'highlight-red';
      else if (k === 'cycleId' || k === 'dispatchId') cls = 'highlight-accent';
      else if (k === 'to' || k === 'from' || k === 'room') cls = 'highlight-blue';
      html += '<tr><td>' + esc(k) + '</td><td class="' + cls + '">' + esc(v) + '</td></tr>';
    }
    html += '</table>';
    html += '</div>';
  } else {
    html += '<div class="popout-section"><div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);font-style:italic">No structured fields</div></div>';
  }

  // Type-specific prominent display
  if (type === 'tool:exec' || type === 'tool:error') {
    html += '<div class="popout-section">';
    html += '<div class="popout-section-header">' + esc(type === 'tool:exec' ? 'Tool Call' : 'Tool Error') + '</div>';
    html += '<table class="popout-field-table">';
    if (fields.tool) html += '<tr><td>Tool</td><td class="highlight-accent">' + esc(fields.tool) + '</td></tr>';
    if (fields.callId) html += '<tr><td>Call ID</td><td>' + esc(fields.callId) + '</td></tr>';
    if (fields.error) html += '<tr><td>Error</td><td class="highlight-red">' + esc(fields.error) + '</td></tr>';
    html += '</table></div>';
  }

  if (type === 'process:output') {
    html += '<div class="popout-section">';
    html += '<div class="popout-section-header">Parsed Output</div>';
    html += '<table class="popout-field-table">';
    if (fields.thinking !== undefined) html += '<tr><td>Thinking blocks</td><td>' + esc(fields.thinking) + '</td></tr>';
    if (fields.messages !== undefined) html += '<tr><td>Messages</td><td>' + esc(fields.messages) + '</td></tr>';
    if (fields.private !== undefined) html += '<tr><td>Private flag</td><td>' + esc(fields.private) + '</td></tr>';
    html += '</table></div>';
  }

  if (type === 'route:sent') {
    html += '<div class="popout-section">';
    html += '<div class="popout-section-header">Route Details</div>';
    html += '<table class="popout-field-table">';
    if (fields.to) html += '<tr><td>To</td><td class="highlight-blue">' + esc(fields.to) + '</td></tr>';
    if (fields.msgId) html += '<tr><td>Message ID</td><td>' + esc(fields.msgId) + '</td></tr>';
    if (fields.blockId) html += '<tr><td>Block ID</td><td>' + esc(fields.blockId) + '</td></tr>';
    if (fields.cycleId) html += '<tr><td>Cycle ID</td><td class="highlight-accent">' + esc(fields.cycleId) + '</td></tr>';
    html += '</table></div>';
  }

  // Linked cycle (if cycleId exists)
  const cycleId = fields.cycleId;
  if (cycleId && transcriptData.length > 0) {
    const txEntry = transcriptData.find(e => e.cycleId === cycleId);
    if (txEntry) {
      const ctx = txEntry.context || {};
      const tokensIn = ctx.totalTokensEst || 0;
      const msgCount = ctx.messageCount || (ctx.messages || []).length || 0;
      const outMsgs = txEntry.messages || [];
      const recipients = outMsgs.map(m => m.to).join(', ') || 'none';
      const txIdx = transcriptData.indexOf(txEntry);

      html += '<div class="popout-section" id="popout-cycle-section">';
      html += '<div class="popout-section-header">Linked Inference Cycle</div>';
      html += '<table class="popout-field-table">';
      html += '<tr><td>Room</td><td class="highlight-blue">' + esc(txEntry.room || '?') + '</td></tr>';
      html += '<tr><td>Messages out</td><td>' + outMsgs.length + (recipients ? ' (→ ' + esc(recipients) + ')' : '') + '</td></tr>';
      html += '<tr><td>Context</td><td>~' + tokensIn.toLocaleString() + ' tokens / ' + msgCount + ' messages</td></tr>';
      if (txEntry.cycleId) html += '<tr><td>Cycle ID</td><td class="highlight-accent">' + esc(txEntry.cycleId) + '</td></tr>';
      html += '</table>';
      html += '<button class="popout-expand-btn" onclick="toggleCycleDetail(' + txIdx + ', this)">▶ Expand full cycle detail</button>';
      html += '<div class="popout-cycle-detail" id="popout-cycle-detail" style="display:none"></div>';
      html += '</div>';
    } else {
      html += '<div class="popout-section">';
      html += '<div class="popout-section-header">Linked Cycle</div>';
      html += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);font-style:italic">cycleId not found in transcript: ' + esc(cycleId) + '</div>';
      html += '</div>';
    }
  }

  body.innerHTML = html;

  // Position: center on screen
  const popout = document.getElementById('op-popout');
  popout.style.top = '50%';
  popout.style.left = '50%';
  popout.style.transform = 'translate(-50%, -50%)';

  document.getElementById('op-backdrop').classList.add('visible');
  popout.classList.add('visible');
}

function toggleCycleDetail(txIdx, btn) {
  const detailEl = document.getElementById('popout-cycle-detail');
  if (!detailEl) return;
  if (detailEl.style.display === 'none') {
    // Render the detail HTML inline using renderTranscriptDetailHTML()
    detailEl.innerHTML = renderTranscriptDetailHTML(transcriptData[txIdx]);
    detailEl.style.display = 'block';
    btn.textContent = '▼ Collapse cycle detail';
  } else {
    detailEl.style.display = 'none';
    btn.textContent = '▶ Expand full cycle detail';
  }
}

// ── Connect ──
async function doConnect() {
  homeUrl = document.getElementById('home-url').value.replace(/\/+$/, '');
  try { localStorage.setItem('blum-viewer-home', homeUrl); } catch (e) {}
  try {
    homeStatus = await api('/status');
    homeConfig = await api('/config');
    connected = true;
    document.getElementById('status-dot').className = 'status-dot on';
    document.getElementById('status-label').textContent = 'live';
    document.getElementById('status-label').style.color = 'var(--green)';
    document.getElementById('connect-btn').classList.add('active');
    document.getElementById('identity').style.display = 'flex';
    document.title = homeStatus.name + "'s home - Blum";
    renderIdentity(); renderConfig(); populateHistoryRooms();
    await fetchOps(); await fetchTranscript(); startPolling();
  } catch (e) {
    connected = false;
    document.getElementById('status-dot').className = 'status-dot off';
    document.getElementById('status-label').textContent = 'offline';
    document.getElementById('status-label').style.color = 'var(--text-dim)';
    alert('Cannot reach home at ' + homeUrl + ': ' + e.message);
  }
}

function renderIdentity() {
  document.getElementById('id-name').textContent = homeStatus.name;
  document.getElementById('id-uid').textContent = homeStatus.uid;
  document.getElementById('id-model').textContent = homeConfig.model || '?';
  document.getElementById('id-rooms').textContent = homeStatus.rooms.join(', ') || 'none';
  const badge = document.getElementById('id-badge');
  if (homeStatus.processing) { badge.className = 'badge processing'; badge.textContent = 'processing'; }
  else if (homeStatus.queueDepth > 0) { badge.className = 'badge processing'; badge.textContent = 'queue: ' + homeStatus.queueDepth; }
  else { badge.className = 'badge idle'; badge.textContent = 'idle'; }
}

// ── Ops ──
async function fetchOps() {
  if (!connected) return;
  try {
    const data = await api('/ops?n=500');
    const entries = data.entries || [];
    if (entries.length === lastOpsCount) return;
    lastOpsCount = entries.length;
    document.getElementById('ops-count').textContent = entries.length;
    const container = document.getElementById('tab-ops');
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    container.innerHTML = '';
    for (const line of entries) {
      const parsed = parseOpLine(line);
      const spaceIdx = line.indexOf(' ');
      const timestamp = spaceIdx !== -1 ? line.slice(0, spaceIdx) : '';
      const rest = spaceIdx !== -1 ? line.slice(spaceIdx + 1) : line;
      const colonIdx = rest.indexOf(' ');
      const typeTag = colonIdx !== -1 ? rest.slice(0, colonIdx) : rest;
      const detail = colonIdx !== -1 ? rest.slice(colonIdx + 1) : '';
      const typeClass = 'op-type-' + typeTag.split(':')[0];
      const time = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
      const div = document.createElement('div');
      div.className = 'op-entry';
      div.title = 'Click to inspect';
      div.innerHTML = '<span class="op-ts">' + time + '</span><span class="op-type ' + typeClass + '">' + esc(typeTag) + '</span><span class="op-detail">' + esc(detail) + '</span>';
      div.addEventListener('click', (e) => { e.stopPropagation(); showOpPopout(parsed, div); });
      container.appendChild(div);
    }
    if (wasAtBottom) requestAnimationFrame(() => container.scrollTop = container.scrollHeight);
  } catch (e) { /* silent */ }
}

// ── Inference Log (Homelogfull) ──
async function fetchTranscript() {
  if (!connected) return;
  try {
    const data = await api('/homelogfull');
    const entries = Array.isArray(data) ? data : [];
    if (entries.length === lastTranscriptCount) return;
    transcriptData = entries;
    lastTranscriptCount = entries.length;
    document.getElementById('transcript-count').textContent = entries.length;
    renderTranscriptList();
  } catch (e) { /* silent */ }
}

function renderTranscriptList() {
  const container = document.getElementById('transcript-list');
  container.innerHTML = '';
  if (transcriptData.length === 0) {
    container.innerHTML = '<div class="empty-state">No inference cycles yet</div>';
    return;
  }
  // Show newest first
  for (let i = transcriptData.length - 1; i >= 0; i--) {
    const entry = transcriptData[i];
    const div = document.createElement('div');
    div.className = 'tx-entry' + (i === selectedTxIndex ? ' selected' : '');
    div.setAttribute('data-index', i);

    const time = new Date(entry.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const ctx = entry.context || {};
    const tokensIn = ctx.totalTokensEst || 0;
    const msgCount = ctx.messageCount || 0;
    const outMsgs = (entry.messages || []).length;

    // Summary: first outbound message preview, or thinking preview
    let summary = '';
    if (entry.messages && entry.messages.length > 0) {
      const first = entry.messages[0];
      summary = first.to + ': ' + (first.content || '').slice(0, 80);
    } else if (entry.thinking && entry.thinking.length > 0) {
      const t0 = entry.thinking[0];
      summary = '(thinking only) ' + (typeof t0 === 'string' ? t0 : t0.content || '').slice(0, 60);
    } else {
      summary = '(no output)';
    }

    const cycleShort = entry.cycleId ? entry.cycleId.slice(-8) : '';
    div.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span class="tx-room">' + esc(entry.room || '?') + '</span>' +
        '<span class="tx-time">#' + i + ' ' + time +
          (cycleShort ? ' <span style="color:var(--accent)">' + cycleShort + '</span>' : '') +
        '</span>' +
      '</div>' +
      '<div class="tx-summary">' + esc(summary) + '</div>' +
      '<div class="tx-tokens">' +
        '<span class="tok-in">' + msgCount + ' msgs / ~' + tokensIn.toLocaleString() + ' tok in</span>' +
        ' &rarr; ' +
        '<span class="tok-out">' + outMsgs + ' out</span>' +
      '</div>';

    div.onclick = () => selectTranscriptEntry(i);
    container.appendChild(div);
  }
}

function selectTranscriptEntry(index) {
  selectedTxIndex = index;
  // Update selected state in list
  document.querySelectorAll('.tx-entry').forEach(el => {
    el.classList.toggle('selected', parseInt(el.getAttribute('data-index')) === index);
  });
  renderTranscriptDetail(transcriptData[index]);
}

function renderTranscriptDetail(entry) {
  const panel = document.getElementById('transcript-detail');
  if (!entry) {
    panel.innerHTML = '<div class="empty-state">Select an inference cycle to inspect</div>';
    return;
  }
  panel.innerHTML = renderTranscriptDetailHTML(entry);
}

function renderTranscriptDetailHTML(entry) {
  if (!entry) return '<div class="empty-state">No data</div>';
  let html = '';

  // ── Header: timestamp + room ──
  const time = new Date(entry.ts).toLocaleString();
  html += '<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:4px">' +
    esc(time) + ' &mdash; room: <span style="color:var(--blue)">' + esc(entry.room || '?') + '</span></div>';

  // ── Trace IDs (if available) ──
  if (entry.cycleId || entry.entryId) {
    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-bottom:12px">';
    if (entry.cycleId) html += 'cycle: <span style="color:var(--accent)">' + esc(entry.cycleId) + '</span> ';
    if (entry.dispatchId) html += '&larr; dispatch: <span style="color:var(--blue)">' + esc(entry.dispatchId) + '</span> ';
    if (entry.entryId) html += '&mdash; entry: <span style="color:var(--green)">' + esc(entry.entryId) + '</span> ';
    if (entry.parseId) html += '&mdash; parse: <span style="color:var(--purple)">' + esc(entry.parseId) + '</span>';
    html += '</div>';
  }

  // ── CONTEXT IN ──
  const ctx = entry.context || {};
  const ctxMsgs = ctx.messages || [];
  html += '<div class="detail-section">';
  html += '<div class="detail-section-header">Context In' +
    '<span class="section-badge" style="background:var(--purple-dim);color:var(--purple)">' +
    ctxMsgs.length + ' messages / ~' + (ctx.totalTokensEst || 0).toLocaleString() + ' tokens</span></div>';

  if (ctxMsgs.length === 0) {
    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:8px;font-style:italic">' +
      'No context data recorded (pre-v3 entry)</div>';
  } else {
    for (const msg of ctxMsgs) {
      const roleClass = (msg.role || 'system');
      let sourceTag = '';

      // Use _meta if available (new format), fall back to heuristics (old format)
      if (msg._meta && msg._meta.source) {
        const src = msg._meta.source;
        const srcColor = src.startsWith('boot') ? 'var(--accent)' :
                         src.startsWith('context') ? 'var(--blue)' :
                         src.startsWith('history') ? 'var(--green)' : 'var(--text-dim)';
        const srcBg = src.startsWith('boot') ? 'var(--accent-dim)' :
                      src.startsWith('context') ? 'var(--blue-dim)' :
                      src.startsWith('history') ? 'var(--green-dim)' : 'var(--surface2)';
        sourceTag = '<span class="section-badge" style="background:' + srcBg + ';color:' + srcColor + '">' + esc(src) + '</span>';
        // Show short UID on hover
        const shortId = (msg._meta.ctxId || msg._meta.docId || '');
        if (shortId) sourceTag += '<span style="font-family:var(--mono);font-size:7px;color:var(--text-dim);margin-left:4px">' + esc(shortId.slice(-8)) + '</span>';
      } else {
        // Heuristic classification for old entries
        const content = msg.full || msg.preview || '';
        if (msg.index < 3 && msg.role === 'system') {
          if (content.startsWith('You are ') || content.includes('You MUST wrap all replies')) {
            sourceTag = '<span class="section-badge" style="background:var(--accent-dim);color:var(--accent)">boot</span>';
          } else {
            sourceTag = '<span class="section-badge" style="background:var(--accent-dim);color:var(--accent)">identity</span>';
          }
        } else if (msg.role === 'system' && (content.includes('This dispatch is from room') || content.includes('Your rooms:'))) {
          sourceTag = '<span class="section-badge" style="background:var(--blue-dim);color:var(--blue)">room context</span>';
        } else if (msg.role === 'user') {
          sourceTag = '<span class="section-badge" style="background:var(--blue-dim);color:var(--blue)">history</span>';
        } else if (msg.role === 'assistant') {
          sourceTag = '<span class="section-badge" style="background:var(--green-dim);color:var(--green)">history</span>';
        }
      }

      html += '<div class="ctx-msg collapsed" onclick="this.classList.toggle(\'collapsed\')">' +
        '<div class="ctx-header">' +
          '<span class="ctx-index">' + msg.index + '</span>' +
          '<span class="ctx-role ' + roleClass + '">' + esc(msg.role) + '</span>' +
          sourceTag +
          '<span class="ctx-tokens">~' + msg.tokens_est + ' tok</span>' +
          '<span class="ctx-preview">' + esc((msg.preview || '').replace(/\n/g, ' ')) + '</span>' +
        '</div>' +
        '<div class="ctx-full">' + esc(msg.full || msg.preview || '') + '</div>' +
      '</div>';
    }
  }
  html += '</div>';

  // ── OUTPUT ──
  html += '<div class="detail-section">';
  const outCount = (entry.thinking || []).length + (entry.messages || []).length + (entry.private ? 1 : 0);
  html += '<div class="detail-section-header">Output' +
    '<span class="section-badge" style="background:var(--green-dim);color:var(--green)">' + outCount + ' blocks</span></div>';

  // Thinking (handle both old string[] and new {blockId, content}[] formats)
  for (const t of (entry.thinking || [])) {
    const content = typeof t === 'string' ? t : t.content;
    const blkLabel = (t && t.blockId) ? '<span style="font-size:7px;color:var(--text-dim);float:right">' + esc(t.blockId.slice(-8)) + '</span>' : '';
    html += '<div class="out-block thinking">' +
      '<div class="out-label">thinking ' + blkLabel + '</div>' +
      '<div class="out-body">' + esc(content) + '</div></div>';
  }
  // Messages (handle both old and new formats)
  for (const m of (entry.messages || [])) {
    const blkLabel = m.blockId ? '<span style="font-size:7px;color:var(--text-dim);float:right">' + esc(m.blockId.slice(-8)) + '</span>' : '';
    html += '<div class="out-block message">' +
      '<div class="out-label">message &rarr; <span class="out-to">' + esc(m.to) + '</span> ' + blkLabel + '</div>' +
      '<div class="out-body">' + esc(m.content) + '</div></div>';
  }
  // Private
  if (entry.private) {
    html += '<div class="out-block private">' +
      '<div class="out-label">private (untagged text)</div>' +
      '<div class="out-body">' + esc(entry.private) + '</div></div>';
  }
  html += '</div>';

  // ── ROUTING (where output went) ──
  html += '<div class="detail-section">';
  html += '<div class="detail-section-header">Routing</div>';
  const msgs = entry.messages || [];
  if (msgs.length === 0) {
    html += '<div class="route-entry" style="font-style:italic">No outbound messages</div>';
  } else {
    for (const m of msgs) {
      const to = m.to || '?';
      const atIdx = to.indexOf('@');
      let routeType = 'external';
      let routeDetail = '';
      if (atIdx === -1) {
        routeType = 'internal';
        routeDetail = 'internal/' + to + '.jsonl';
      } else {
        const recipient = to.slice(0, atIdx);
        const room = to.slice(atIdx + 1);
        if (recipient === 'broadcast') {
          routeType = 'broadcast';
          routeDetail = room + ' chatlog (no dispatch)';
        } else {
          routeDetail = room + ' &rarr; dispatch to ' + recipient;
        }
      }
      html += '<div class="route-entry">' +
        '<span class="route-to">' + esc(to) + '</span> ' +
        '<span class="route-type">[' + routeType + ']</span> ' +
        routeDetail + '</div>';
    }
  }
  // Homelogfull always written
  html += '<div class="route-entry" style="color:var(--accent)">homelogfull/homelogfull.jsonl (always)</div>';
  html += '</div>';

  // ── TRACE (full traceability chain) ──
  if (entry._trace) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-header">Trace</div>';
    const trace = entry._trace;
    html += '<table class="config-table">';
    html += '<tr><td>Agent</td><td>' + esc(trace.agentName || '?') + '</td></tr>';
    html += '<tr><td>Dispatch ID</td><td>' + esc(trace.dispatchId || '-') + '</td></tr>';
    html += '<tr><td>Cycle ID</td><td>' + esc(trace.cycleId || '-') + '</td></tr>';
    html += '<tr><td>Response ID</td><td>' + esc(trace.finalResponseId || '-') + '</td></tr>';
    html += '<tr><td>Iterations</td><td>' + (trace.totalIterations || 0) + '</td></tr>';
    html += '<tr><td>Started</td><td>' + esc(trace.startedAt || '-') + '</td></tr>';
    html += '<tr><td>Completed</td><td>' + esc(trace.completedAt || '-') + '</td></tr>';
    html += '</table>';

    if (trace.iterations && trace.iterations.length > 0) {
      html += '<div style="margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--text-dim)">';
      for (const iter of trace.iterations) {
        html += '<div style="padding:2px 0">';
        html += 'iter ' + iter.number + ' <span style="color:var(--accent)">' + esc(iter.iterationId.slice(-8)) + '</span>';
        html += ' stop=' + esc(iter.stopReason || '?');
        html += ' resp=<span style="color:var(--purple)">' + esc(iter.responseId.slice(-8)) + '</span>';
        if (iter.toolCalls && iter.toolCalls.length > 0) {
          html += ' tools=[' + iter.toolCalls.map(tc => esc(tc.name)).join(', ') + ']';
        }
        html += ' text=' + (iter.textLength || 0) + 'ch';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // ── Raw nucleus response (collapsible) ──
  if (entry.nucleusResponse) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-header">Raw Nucleus Response</div>';
    html += '<div class="ctx-msg collapsed" onclick="this.classList.toggle(\'collapsed\')">' +
      '<div class="ctx-header">' +
        '<span class="ctx-preview" style="color:var(--text-dim)">Click to expand raw response (' +
        entry.nucleusResponse.length + ' chars)</span>' +
      '</div>' +
      '<div class="ctx-full">' + esc(entry.nucleusResponse) + '</div>' +
    '</div>';
    html += '</div>';
  }

  return html;
}

// ── History ──
function populateHistoryRooms() {
  const sel = document.getElementById('history-room');
  sel.innerHTML = '';
  for (const room of homeStatus.rooms || []) {
    const opt = document.createElement('option');
    opt.value = room; opt.textContent = room;
    sel.appendChild(opt);
  }
  if (homeStatus.rooms.length > 0) fetchHistory();
  populateSendBar();
}

async function populateSendBar() {
  const sendBar = document.getElementById('send-bar');
  const sel = document.getElementById('send-to');
  sel.innerHTML = '';

  // Fetch room members from room server for each room the home is in
  const rooms = homeStatus.rooms || [];
  if (rooms.length === 0) return;

  // Guess room server URL from home URL (strip port, use 3141)
  const homeOrigin = new URL(homeUrl).hostname;
  const roomServerUrl = 'http://' + homeOrigin + ':3141';

  const agentsAdded = new Set();

  for (const room of rooms) {
    // Add broadcast option for this room
    const broadcastOpt = document.createElement('option');
    broadcastOpt.value = 'broadcast@' + room;
    broadcastOpt.textContent = 'broadcast@' + room + ' (all)';
    sel.appendChild(broadcastOpt);

    // Fetch participants from room server
    try {
      const resp = await fetch(roomServerUrl + '/api/room/' + room + '/chatlog');
      if (!resp.ok) continue;
      // We need the state endpoint instead
    } catch (e) { /* silent */ }
  }

  // Try state endpoint for participants
  try {
    const resp = await fetch(roomServerUrl + '/api/state');
    if (resp.ok) {
      const state = await resp.json();
      for (const room of rooms) {
        const participants = state.rooms?.[room]?.participants || [];
        for (const p of participants) {
          if (!agentsAdded.has(p)) {
            agentsAdded.add(p);
            const opt = document.createElement('option');
            opt.value = p + '@' + room;
            opt.textContent = p + '@' + room;
            sel.appendChild(opt);
          }
        }
      }
    }
  } catch (e) { /* room server unreachable, send bar still shows broadcast */ }

  sendBar.classList.add('visible');
}

async function doSend() {
  const to = document.getElementById('send-to').value;
  const text = document.getElementById('send-text').value.trim();
  const statusEl = document.getElementById('send-status');
  const btn = document.getElementById('send-btn');
  if (!text) return;
  if (!to) return;

  btn.classList.add('sending');
  btn.textContent = 'Sending…';
  statusEl.textContent = '';
  statusEl.className = 'send-status';

  try {
    const resp = await fetch(homeUrl + '/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, message: text })
    });
    if (resp.ok) {
      document.getElementById('send-text').value = '';
      statusEl.textContent = '✓ sent to ' + to;
      statusEl.className = 'send-status';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } else {
      const err = await resp.text();
      statusEl.textContent = 'Error: ' + err.slice(0, 80);
      statusEl.className = 'send-error';
    }
  } catch (e) {
    statusEl.textContent = 'Failed: ' + e.message;
    statusEl.className = 'send-error';
  } finally {
    btn.classList.remove('sending');
    btn.textContent = 'Send';
  }
}

async function fetchHistory() {
  if (!connected) return;
  const room = document.getElementById('history-room').value;
  if (!room) return;
  try {
    const data = await api('/history/' + room);
    const messages = data.messages || data || [];
    const arr = Array.isArray(messages) ? messages : [];
    document.getElementById('history-count').textContent = arr.length;
    document.getElementById('history-msg-count').textContent = arr.length + ' messages';
    const body = document.getElementById('history-body');
    body.innerHTML = '';
    if (arr.length === 0) {
      body.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-style:italic;font-size:10px">No history for this room</div>';
      return;
    }
    for (const msg of arr) {
      const div = document.createElement('div');
      const role = msg.role || 'unknown';
      div.className = 'hist-msg ' + role;
      const content = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
      div.innerHTML = '<div class="hist-meta"><span class="hist-role">' + role + '</span></div><div class="hist-body">' + esc(content) + '</div>';
      body.appendChild(div);
    }
    body.scrollTop = body.scrollHeight;
  } catch (e) { /* silent */ }
}

// ── Config ──
function renderConfig() {
  if (!homeConfig) return;
  const rows = [
    ['name', homeConfig.name], ['uid', homeConfig.uid], ['model', homeConfig.model],
    ['max tokens', homeConfig.maxTokens], ['context budget', homeConfig.contextBudget],
    ['rooms', (homeConfig.rooms || []).join(', ') || 'none'],
    ['blocked rooms', (homeConfig.blocked?.rooms || []).join(', ') || 'none'],
    ['blocked participants', (homeConfig.blocked?.participants || []).join(', ') || 'none'],
    ['public key', homeConfig.publicKey || '-'],
  ];
  let html = '<table class="config-table">';
  for (const [k, v] of rows) { html += '<tr><td>' + esc(k) + '</td><td>' + esc(String(v ?? '-')) + '</td></tr>'; }
  html += '</table>';
  document.getElementById('tab-config').innerHTML = html;
}

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  try { localStorage.setItem('blum-viewer-tab', tab); } catch (e) {}
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-ops').style.display = tab === 'ops' ? 'block' : 'none';
  document.getElementById('tab-transcript').style.display = tab === 'transcript' ? 'flex' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'flex' : 'none';
  document.getElementById('tab-config').style.display = tab === 'config' ? 'block' : 'none';
  if (tab === 'transcript') fetchTranscript();
  if (tab === 'history') fetchHistory();
}

// ── Polling ──
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!connected) return;
    try {
      homeStatus = await api('/status');
      renderIdentity();
    } catch (e) {
      connected = false;
      document.getElementById('status-dot').className = 'status-dot off';
      document.getElementById('status-label').textContent = 'offline';
      document.getElementById('status-label').style.color = 'var(--text-dim)';
      document.getElementById('id-badge').className = 'badge offline';
      document.getElementById('id-badge').textContent = 'offline';
      return;
    }
    if (currentTab === 'ops') await fetchOps();
    if (currentTab === 'transcript') await fetchTranscript();
    if (currentTab === 'history') await fetchHistory();
  }, 2000);
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const homeParam = params.get('home');
  // T036: Restore home URL and tab from localStorage
  try {
    const savedHome = localStorage.getItem('blum-viewer-home');
    const savedTab = localStorage.getItem('blum-viewer-tab');
    if (homeParam) {
      document.getElementById('home-url').value = homeParam;
      doConnect();
    } else if (savedHome) {
      document.getElementById('home-url').value = savedHome;
      doConnect();
    }
    if (savedTab && ['ops', 'transcript', 'history', 'config'].includes(savedTab)) {
      switchTab(savedTab);
    }
  } catch (e) {}
});
</script>
