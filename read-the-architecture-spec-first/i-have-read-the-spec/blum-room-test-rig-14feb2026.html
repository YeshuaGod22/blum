<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blum Room Test Rig — 14 Feb 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #111115;
    --surface2: #1a1a20;
    --border: #2a2a33;
    --border-bright: #3a3a48;
    --text: #d4d4dc;
    --text-dim: #6a6a78;
    --text-bright: #eeeeF4;
    --accent: #e8a44a;
    --accent-dim: rgba(232, 164, 74, 0.12);
    --green: #5cb870;
    --green-dim: rgba(92, 184, 112, 0.12);
    --blue: #5b8dd9;
    --blue-dim: rgba(91, 141, 217, 0.12);
    --red: #d45b5b;
    --red-dim: rgba(212, 91, 91, 0.12);
    --purple: #a078cc;
    --purple-dim: rgba(160, 120, 204, 0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  header span {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .header-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    margin-left: auto;
  }

  .header-btn:hover { background: var(--border); color: var(--text-bright); }
  .header-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .main-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* === DIRECTORY === */
  .directory {
    width: 260px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
  }

  .directory.hidden { display: none; }

  .dir-section {
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .dir-section:last-child { border-bottom: none; flex: 1; }

  .dir-section-header {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .dir-section-header .dir-count {
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 8px;
  }

  .dir-list {
    overflow-y: auto;
    padding: 4px;
    flex: 1;
  }

  .dir-entry {
    padding: 5px 8px;
    border-radius: 3px;
    margin-bottom: 2px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
  }

  .dir-entry:hover { background: var(--surface2); }

  .dir-entry .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dir-entry .dir-name {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
  }

  .dir-entry .dir-uid {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
  }

  .dir-entry .dir-detail {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text-dim);
  }

  .dir-entry .dir-remove {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    cursor: pointer;
    color: var(--text-dim);
    border: none;
    background: none;
    padding: 0 3px;
  }

  .dir-entry .dir-remove:hover { color: var(--red); }

  .dir-room-members {
    padding: 2px 0 4px 20px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  .dir-room-members .member-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 1px 0;
  }

  .dir-room-members .member-row .remove-member {
    font-size: 8px;
    cursor: pointer;
    color: var(--text-dim);
    border: none;
    background: none;
    font-family: var(--mono);
    padding: 0 2px;
  }

  .dir-room-members .member-row .remove-member:hover { color: var(--red); }

  .dir-create {
    padding: 6px 8px;
    display: flex;
    gap: 4px;
    align-items: center;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .dir-create input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 6px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 10px;
    outline: none;
    min-width: 0;
  }

  .dir-create input:focus { border-color: var(--accent); }

  .dir-create button {
    font-family: var(--mono);
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 2px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
  }

  .dir-create button:hover { background: #d4943e; }

  .dir-add-member {
    padding: 4px 8px 6px;
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .dir-add-member select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3px 4px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 9px;
    cursor: pointer;
    min-width: 0;
  }

  .dir-add-member button {
    font-family: var(--mono);
    font-size: 8px;
    padding: 3px 6px;
    border-radius: 2px;
    border: 1px solid var(--green);
    background: var(--green-dim);
    color: var(--green);
    cursor: pointer;
    flex-shrink: 0;
  }

  .dir-add-member button:hover { background: var(--green); color: var(--bg); }

  /* === GRID === */
  .grid {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
    min-width: 0;
  }

  .grid-row {
    display: flex;
    gap: 1px;
    min-height: 0;
    overflow: hidden;
  }

  .panel {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
    flex: 1;
  }

  .panel-header {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .panel-header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .panel-header .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-header .panel-uid {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    margin-left: auto;
    flex-shrink: 0;
  }

  .panel-header .panel-sub {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 3px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-height: 0;
  }

  .panel-body.empty-room::after {
    content: 'No messages';
    color: var(--text-dim);
    font-style: italic;
    font-size: 9px;
    padding: 8px;
    text-align: center;
  }

  .panel-body.empty-home::after {
    content: 'No dispatches';
    color: var(--text-dim);
    font-style: italic;
    font-size: 9px;
    padding: 8px;
    text-align: center;
  }

  .panel-footer {
    padding: 2px 6px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    text-align: right;
    flex-shrink: 0;
  }

  .panel.room .panel-header { background: var(--surface); }
  .panel.home .panel-header { background: var(--surface2); }

  /* === MESSAGES (room transcript) === */
  .msg {
    padding: 2px 5px;
    border-radius: 2px;
    font-size: 9px;
    line-height: 1.4;
    border-left: 2px solid transparent;
    animation: fadeIn 0.12s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg .msg-meta {
    font-family: var(--mono);
    font-size: 7px;
    display: flex;
    gap: 2px;
    align-items: baseline;
    margin-bottom: 1px;
  }

  .msg .msg-from { font-weight: 600; }
  .msg .msg-arrow { color: var(--text-dim); }
  .msg .msg-ts { color: var(--text-dim); margin-left: auto; font-size: 7px; }
  .msg .msg-body { color: var(--text-bright); }

  .msg .msg-quote {
    border-left: 2px solid var(--border-bright);
    padding: 1px 4px;
    margin: 1px 0 2px 0;
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    font-style: italic;
    background: rgba(255,255,255,0.02);
    border-radius: 1px;
  }

  .msg .msg-quote .quote-from { font-weight: 500; font-style: normal; }

  .msg.error {
    background: var(--red-dim);
    border-left-color: var(--red);
    color: var(--red);
  }

  /* === DISPATCH BATCH (home) === */
  .dispatch-batch {
    padding: 3px 5px;
    border-radius: 2px;
    margin-bottom: 2px;
    animation: fadeIn 0.12s ease;
  }

  .dispatch-batch.push {
    background: var(--green-dim);
    border-left: 2px solid var(--green);
  }

  .dispatch-batch.pull {
    background: var(--blue-dim);
    border-left: 2px solid var(--blue);
  }

  .dispatch-batch .db-header {
    font-family: var(--mono);
    font-size: 7px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .dispatch-batch.push .db-header { color: var(--green); }
  .dispatch-batch.pull .db-header { color: var(--blue); }

  .dispatch-batch .db-meta {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .dispatch-batch .db-msg {
    font-family: var(--mono);
    font-size: 8px;
    padding: 2px 3px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    color: var(--text);
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.1s;
  }

  .dispatch-batch .db-msg:hover { background: rgba(255,255,255,0.04); }
  .dispatch-batch .db-msg:last-child { border-bottom: none; }

  .dispatch-batch .db-msg .db-quote {
    font-size: 7px;
    color: var(--text-dim);
    font-style: italic;
    padding-left: 4px;
    border-left: 1px solid var(--border);
    margin-bottom: 1px;
  }

  /* === QUOTE INDICATOR (home input) === */
  .quote-indicator {
    display: none;
    padding: 2px 5px;
    background: var(--surface2);
    border-left: 2px solid var(--accent);
    border-radius: 1px;
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    align-items: center;
    gap: 4px;
  }

  .quote-indicator.active { display: flex; }

  .quote-indicator .quote-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .quote-indicator .quote-clear {
    cursor: pointer;
    color: var(--text-dim);
    border: none;
    background: none;
    font-family: var(--mono);
    font-size: 9px;
    padding: 0 2px;
    flex-shrink: 0;
  }

  .quote-indicator .quote-clear:hover { color: var(--red); }

  /* === HOME INPUT === */
  .home-input {
    padding: 4px 5px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .home-input-row {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .home-input-row label {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text-dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .home-input-row select,
  .home-input-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2px 4px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 9px;
    outline: none;
    min-width: 0;
  }

  .home-input-row select { cursor: pointer; }
  .home-input-row select option { background: var(--bg); }
  .home-input-row input { flex: 1; }
  .home-input-row input:focus, .home-input-row select:focus { border-color: var(--accent); }

  .home-input-row .at-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .home-input .home-btns {
    display: flex;
    gap: 2px;
    justify-content: flex-end;
  }

  .home-input button {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    transition: all 0.12s;
  }

  .btn-send { background: var(--accent); color: var(--bg); }
  .btn-send:hover { background: #d4943e; }

  .btn-pull {
    background: var(--blue-dim);
    border: 1px solid var(--blue) !important;
    color: var(--blue);
  }
  .btn-pull:hover { background: var(--blue); color: var(--bg); }
</style>
</head>
<body>

<header>
  <h1>BLUM ROOM TEST RIG</h1>
  <span id="header-stats"></span>
  <button class="header-btn active" id="dir-toggle" onclick="toggleDirectory()">Directory</button>
</header>

<div class="main-layout">
  <div class="directory" id="directory">
    <div class="dir-section">
      <div class="dir-section-header">
        Participants <span class="dir-count" id="participant-count">0</span>
      </div>
      <div class="dir-list" id="participant-list"></div>
      <div class="dir-create">
        <input type="text" id="new-participant-name" placeholder="new participant name" />
        <button onclick="createParticipant()">+ Add</button>
      </div>
    </div>
    <div class="dir-section">
      <div class="dir-section-header">
        Rooms <span class="dir-count" id="room-count">0</span>
      </div>
      <div class="dir-list" id="room-list"></div>
      <div class="dir-create">
        <input type="text" id="new-room-name" placeholder="new room name" />
        <button onclick="createRoom()">+ Add</button>
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="grid-row" id="rooms-row"></div>
    <div class="grid-row" id="homes-row"></div>
  </div>
</div>

<script>
// ========================================
// DATA MODEL
// ========================================

function generateUID(prefix) {
  const bytes = new Uint8Array(8);
  crypto.getRandomValues(bytes);
  const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  return prefix + '_' + hex;
}

const colorPool = [
  { name: 'amber',  hex: '#e8a44a', dim: 'rgba(232,164,74,0.12)' },
  { name: 'green',  hex: '#5cb870', dim: 'rgba(92,184,112,0.12)' },
  { name: 'purple', hex: '#a078cc', dim: 'rgba(160,120,204,0.12)' },
  { name: 'blue',   hex: '#5b8dd9', dim: 'rgba(91,141,217,0.12)' },
  { name: 'coral',  hex: '#d4766a', dim: 'rgba(212,118,106,0.12)' },
  { name: 'teal',   hex: '#4db8a0', dim: 'rgba(77,184,160,0.12)' },
  { name: 'pink',   hex: '#c472b6', dim: 'rgba(196,114,182,0.12)' },
  { name: 'lime',   hex: '#8cb84d', dim: 'rgba(140,184,77,0.12)' },
  { name: 'gold',   hex: '#c4a84d', dim: 'rgba(196,168,77,0.12)' },
  { name: 'sky',    hex: '#4da4d4', dim: 'rgba(77,164,212,0.12)' },
];
let colorIndex = 0;
function nextColor() { const c = colorPool[colorIndex % colorPool.length]; colorIndex++; return c; }

const participants = {};
const rooms = {};

// Per-home quote state: { msgId, from, body, room }
const quoteState = {};

function addParticipant(name) {
  if (participants[name]) return { error: `${name} already exists` };
  participants[name] = {
    name, uid: generateUID('uid'), color: nextColor(), dispatches: []
  };
  quoteState[name] = null;
  return { success: true };
}

function removeParticipant(name) {
  if (!participants[name]) return { error: `Unknown: ${name}` };
  // Leave all rooms
  for (const rName of Object.keys(rooms)) {
    const idx = rooms[rName].participants.indexOf(name);
    if (idx !== -1) rooms[rName].participants.splice(idx, 1);
  }
  delete participants[name];
  delete quoteState[name];
  return { success: true };
}

function addRoom(name) {
  if (rooms[name]) return { error: `${name} already exists` };
  rooms[name] = { name, uid: generateUID('room'), participants: [], transcript: [] };
  return { success: true };
}

function removeRoom(name) {
  if (!rooms[name]) return { error: `Unknown room: ${name}` };
  delete rooms[name];
  return { success: true };
}

function joinRoom(participantName, roomName) {
  const p = participants[participantName];
  const r = rooms[roomName];
  if (!p) return { error: `Unknown participant: ${participantName}` };
  if (!r) return { error: `Unknown room: ${roomName}` };
  if (r.participants.includes(participantName)) return { error: `${participantName} already in ${roomName}` };
  r.participants.push(participantName);
  return { success: true };
}

function leaveRoom(participantName, roomName) {
  const r = rooms[roomName];
  if (!r) return { error: `Unknown room: ${roomName}` };
  const idx = r.participants.indexOf(participantName);
  if (idx === -1) return { error: `${participantName} not in ${roomName}` };
  r.participants.splice(idx, 1);
  return { success: true };
}

// ========================================
// CORE MESSAGE LOGIC
// ========================================

function sendMessage(fromName, toName, roomName, body, replyTo) {
  const from = participants[fromName];
  const room = rooms[roomName];
  if (!from) return { error: `Unknown: ${fromName}` };
  if (!room) return { error: `Unknown room: ${roomName}` };
  if (!room.participants.includes(fromName)) return { error: `${fromName} not in ${roomName}` };

  const msg = {
    id: generateUID('msg'),
    from: fromName,
    fromUID: from.uid,
    fromAddress: fromName + '@' + roomName,
    room: roomName,
    roomUID: room.uid,
    body,
    ts: new Date().toISOString()
  };

  // Quote-reply
  if (replyTo) {
    msg.replyTo = replyTo.msgId;
    msg.quoteFrom = replyTo.from;
    msg.quoteBody = replyTo.body;
  }

  if (toName && toName !== 'broadcast') {
    const to = participants[toName];
    if (!to) return { error: `Unknown: ${toName}` };
    if (!room.participants.includes(toName)) return { error: `${toName} not in ${roomName}` };
    msg.to = toName;
    msg.toUID = to.uid;
    msg.toAddress = toName + '@' + roomName;
  }

  room.transcript.push(msg);
  renderRoom(roomName);

  if (msg.to) {
    dispatchToHome(msg.to, roomName, 'push');
  }

  return { success: true, msg };
}

function dispatchToHome(agentName, roomName, type) {
  const agent = participants[agentName];
  const room = rooms[roomName];
  if (!agent || !room) return;

  agent.dispatches.push({
    type,
    room: roomName,
    roomUID: room.uid,
    messageCount: room.transcript.length,
    messages: [...room.transcript],
    ts: new Date().toISOString()
  });

  renderHome(agentName);
}

function pullFromRoom(agentName, roomName) {
  const agent = participants[agentName];
  const room = rooms[roomName];
  if (!agent) return { error: `Unknown: ${agentName}` };
  if (!room) return { error: `Unknown room: ${roomName}` };
  if (!room.participants.includes(agentName)) return { error: `${agentName} not in ${roomName}` };
  dispatchToHome(agentName, roomName, 'pull');
  return { success: true };
}

// ========================================
// QUOTE STATE
// ========================================

function setQuote(homeName, msgId, from, body, room) {
  quoteState[homeName] = { msgId, from, body, room };
  renderQuoteIndicator(homeName);
}

function clearQuote(homeName) {
  quoteState[homeName] = null;
  renderQuoteIndicator(homeName);
}

function renderQuoteIndicator(homeName) {
  const el = document.getElementById('h-quote-' + homeName);
  if (!el) return;
  const q = quoteState[homeName];
  if (q) {
    el.className = 'quote-indicator active';
    const truncated = q.body.length > 60 ? q.body.substring(0, 60) + '…' : q.body;
    el.innerHTML =
      `<span class="quote-text">↩ <span style="color:${pColor(q.from)}">${q.from}</span>: ${esc(truncated)}</span>` +
      `<button class="quote-clear" onclick="clearQuote('${homeName}')" title="Clear quote">×</button>`;
  } else {
    el.className = 'quote-indicator';
    el.innerHTML = '';
  }
}

// ========================================
// RENDERING HELPERS
// ========================================

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function ts(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function pColor(name) {
  const p = participants[name];
  return p ? p.color.hex : 'var(--text)';
}

// ========================================
// DIRECTORY RENDERING
// ========================================

function renderDirectory() {
  renderParticipantDirectory();
  renderRoomDirectory();
  updateHeaderStats();
}

function renderParticipantDirectory() {
  const list = document.getElementById('participant-list');
  document.getElementById('participant-count').textContent = Object.keys(participants).length;

  list.innerHTML = '';
  for (const [name, p] of Object.entries(participants)) {
    const memberOf = Object.keys(rooms).filter(r => rooms[r].participants.includes(name));
    const div = document.createElement('div');
    div.className = 'dir-entry';
    div.innerHTML =
      `<div class="dot" style="background:${p.color.hex}"></div>` +
      `<div>` +
        `<div class="dir-name" style="color:${p.color.hex}">${name}</div>` +
        `<div class="dir-detail">rooms: ${memberOf.length > 0 ? memberOf.join(', ') : 'none'}</div>` +
      `</div>` +
      `<span class="dir-uid">${p.uid}</span>` +
      `<button class="dir-remove" onclick="doRemoveParticipant('${name}')" title="Remove ${name}">×</button>`;
    list.appendChild(div);
  }
}

function renderRoomDirectory() {
  const list = document.getElementById('room-list');
  document.getElementById('room-count').textContent = Object.keys(rooms).length;

  list.innerHTML = '';
  for (const [name, r] of Object.entries(rooms)) {
    const wrapper = document.createElement('div');

    const div = document.createElement('div');
    div.className = 'dir-entry';
    div.innerHTML =
      `<span style="font-size:9px">◻</span>` +
      `<div>` +
        `<div class="dir-name" style="color:var(--text-bright)">${name}</div>` +
        `<div class="dir-detail">${r.participants.length} members · ${r.transcript.length} msg</div>` +
      `</div>` +
      `<span class="dir-uid">${r.uid}</span>` +
      `<button class="dir-remove" onclick="doRemoveRoom('${name}')" title="Remove ${name}">×</button>`;
    wrapper.appendChild(div);

    if (r.participants.length > 0) {
      const members = document.createElement('div');
      members.className = 'dir-room-members';
      for (const pName of r.participants) {
        const row = document.createElement('div');
        row.className = 'member-row';
        row.innerHTML =
          `<span style="color:${pColor(pName)}">${pName}</span>` +
          `<button class="remove-member" onclick="doLeaveRoom('${pName}','${name}')" title="Remove ${pName}">×</button>`;
        members.appendChild(row);
      }
      wrapper.appendChild(members);
    }

    const nonMembers = Object.keys(participants).filter(p => !r.participants.includes(p));
    if (nonMembers.length > 0) {
      const addDiv = document.createElement('div');
      addDiv.className = 'dir-add-member';
      addDiv.innerHTML =
        `<select id="add-to-${name}">` +
          nonMembers.map(p => `<option value="${p}">${p}</option>`).join('') +
        `</select>` +
        `<button onclick="doJoinRoom('${name}')">+ Join</button>`;
      wrapper.appendChild(addDiv);
    }

    list.appendChild(wrapper);
  }
}

function updateHeaderStats() {
  const pCount = Object.keys(participants).length;
  const rCount = Object.keys(rooms).length;
  document.getElementById('header-stats').textContent =
    `${pCount} participant${pCount !== 1 ? 's' : ''} · ${rCount} room${rCount !== 1 ? 's' : ''}`;
}

// ========================================
// GRID RENDERING
// ========================================

function rebuildGrid() {
  const roomsRow = document.getElementById('rooms-row');
  const homesRow = document.getElementById('homes-row');
  roomsRow.innerHTML = '';
  homesRow.innerHTML = '';

  const roomNames = Object.keys(rooms);
  const participantNames = Object.keys(participants);

  for (const name of roomNames) {
    const room = rooms[name];
    const panel = document.createElement('div');
    panel.className = 'panel room';
    panel.innerHTML =
      `<div class="panel-header">` +
        `<span style="font-size:9px">◻</span>` +
        `<div style="min-width:0">` +
          `<div class="panel-title" style="color:var(--text-bright)">${name}</div>` +
          `<div class="panel-sub" id="rsub-${name}">${room.participants.join(', ')}</div>` +
        `</div>` +
        `<span class="panel-uid">${room.uid}</span>` +
      `</div>` +
      `<div class="panel-body empty-room" id="rb-${name}"></div>` +
      `<div class="panel-footer" id="rf-${name}">0 msg</div>`;
    roomsRow.appendChild(panel);
  }

  if (roomNames.length === 0) {
    roomsRow.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-style:italic;font-size:11px;background:var(--bg)">No rooms</div>';
  }

  for (const name of participantNames) {
    const agent = participants[name];
    const agentRooms = roomNames.filter(r => rooms[r].participants.includes(name));
    const otherParticipants = participantNames.filter(p => p !== name);

    const toOpts = `<option value="broadcast">bcast</option>` +
      otherParticipants.map(p => `<option value="${p}">${p}</option>`).join('');

    const roomOpts = agentRooms.length > 0
      ? agentRooms.map(r => `<option value="${r}">${r}</option>`).join('')
      : `<option value="" disabled>no rooms</option>`;

    const panel = document.createElement('div');
    panel.className = 'panel home';
    panel.innerHTML =
      `<div class="panel-header">` +
        `<div class="dot" style="background:${agent.color.hex}"></div>` +
        `<div style="min-width:0">` +
          `<div class="panel-title" style="color:${agent.color.hex}">${name}'s home</div>` +
          `<div class="panel-sub" id="hsub-${name}">${agentRooms.join(', ') || 'no rooms'}</div>` +
        `</div>` +
        `<span class="panel-uid">${agent.uid}</span>` +
      `</div>` +
      `<div class="panel-body empty-home" id="hb-${name}"></div>` +
      `<div class="home-input">` +
        `<div class="quote-indicator" id="h-quote-${name}"></div>` +
        `<div class="home-input-row">` +
          `<label>to</label>` +
          `<select id="h-to-${name}">${toOpts}</select>` +
          `<span class="at-label">@</span>` +
          `<select id="h-room-${name}">${roomOpts}</select>` +
          `<input type="text" id="h-body-${name}" placeholder="message..." />` +
        `</div>` +
        `<div class="home-btns">` +
          `<select id="h-pull-${name}" style="font-family:var(--mono);font-size:8px;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:2px 3px;color:var(--text);cursor:pointer;">${roomOpts}</select>` +
          `<button class="btn-pull" onclick="doPull('${name}')">Pull</button>` +
          `<button class="btn-send" onclick="doSend('${name}')">Send</button>` +
        `</div>` +
      `</div>` +
      `<div class="panel-footer" id="hf-${name}">0 dispatches</div>`;
    homesRow.appendChild(panel);

    setTimeout(() => {
      const input = document.getElementById('h-body-' + name);
      if (input) input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(name); });
    }, 0);
  }

  if (participantNames.length === 0) {
    homesRow.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-style:italic;font-size:11px;background:var(--bg)">No participants</div>';
  }

  for (const r of roomNames) renderRoom(r);
  for (const p of participantNames) renderHome(p);
}

function renderRoom(name) {
  const room = rooms[name];
  const body = document.getElementById('rb-' + name);
  const footer = document.getElementById('rf-' + name);
  const sub = document.getElementById('rsub-' + name);
  if (!body) return;

  if (sub) sub.textContent = room.participants.join(', ') || 'no members';

  body.innerHTML = '';
  body.className = 'panel-body' + (room.transcript.length === 0 ? ' empty-room' : '');

  for (const msg of room.transcript) {
    const div = document.createElement('div');
    div.style.borderLeftColor = pColor(msg.from);
    div.className = 'msg';

    const toStr = msg.to
      ? `<span class="msg-arrow">→</span> <span style="color:${pColor(msg.to)}">${msg.toAddress}</span>`
      : `<span class="msg-arrow">→ broadcast</span>`;

    let quoteHtml = '';
    if (msg.replyTo) {
      quoteHtml = `<div class="msg-quote"><span class="quote-from" style="color:${pColor(msg.quoteFrom)}">${msg.quoteFrom}</span>: ${esc(msg.quoteBody)}</div>`;
    }

    div.innerHTML =
      `<div class="msg-meta">` +
        `<span class="msg-from" style="color:${pColor(msg.from)}">${msg.fromAddress}</span>` +
        toStr +
        `<span class="msg-ts">${ts(msg.ts)}</span>` +
      `</div>` +
      quoteHtml +
      `<div class="msg-body">${esc(msg.body)}</div>`;
    body.appendChild(div);
  }

  body.scrollTop = body.scrollHeight;
  if (footer) footer.textContent = room.transcript.length + ' msg · ' + room.participants.join(', ');
}

function renderHome(name) {
  const agent = participants[name];
  const body = document.getElementById('hb-' + name);
  const footer = document.getElementById('hf-' + name);
  const sub = document.getElementById('hsub-' + name);
  if (!body) return;

  const agentRooms = Object.keys(rooms).filter(r => rooms[r].participants.includes(name));
  if (sub) sub.textContent = agentRooms.join(', ') || 'no rooms';

  body.innerHTML = '';
  body.className = 'panel-body' + (agent.dispatches.length === 0 ? ' empty-home' : '');

  for (const d of agent.dispatches) {
    const div = document.createElement('div');
    div.className = 'dispatch-batch ' + d.type;

    const label = d.type === 'push' ? 'PUSH' : 'PULL';
    let msgsHtml = '';
    if (d.messages.length === 0) {
      msgsHtml = '<div style="color:var(--text-dim);font-style:italic;font-size:7px">empty</div>';
    } else {
      msgsHtml = d.messages.map(m => {
        const toStr = m.to ? ' → ' + m.to : '';
        let quoteHtml = '';
        if (m.replyTo) {
          quoteHtml = `<div class="db-quote">${m.quoteFrom}: ${esc(m.quoteBody)}</div>`;
        }
        // Clicking a message in a dispatch sets it as quote for this home
        const escaped = esc(m.body).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        return `<div class="db-msg" onclick="setQuote('${name}','${m.id}','${m.from}','${escaped}','${m.room}')" title="Click to quote-reply">` +
          quoteHtml +
          `<span style="color:${pColor(m.from)}">${m.from}${toStr}</span>: ${esc(m.body)}` +
        `</div>`;
      }).join('');
    }

    div.innerHTML =
      `<div class="db-header">${label} from ${d.room} (${d.messageCount} msg)</div>` +
      `<div class="db-meta">${d.roomUID} · ${ts(d.ts)}</div>` +
      msgsHtml;
    body.appendChild(div);
  }

  body.scrollTop = body.scrollHeight;
  if (footer) footer.textContent = agent.dispatches.length + ' dispatches · rooms: ' + agentRooms.join(', ');

  renderQuoteIndicator(name);
}

// ========================================
// EVENT HANDLERS
// ========================================

function doSend(fromName) {
  const toEl = document.getElementById('h-to-' + fromName);
  const roomEl = document.getElementById('h-room-' + fromName);
  const bodyEl = document.getElementById('h-body-' + fromName);
  if (!toEl || !roomEl || !bodyEl) return;

  const to = toEl.value;
  const room = roomEl.value;
  const body = bodyEl.value.trim();
  if (!body || !room) return;

  const quote = quoteState[fromName] || null;
  const result = sendMessage(fromName, to === 'broadcast' ? null : to, room, body, quote);

  if (result.error) {
    const hb = document.getElementById('hb-' + fromName);
    if (hb) {
      const div = document.createElement('div');
      div.className = 'msg error';
      div.innerHTML = `<div class="msg-body">${esc(result.error)}</div>`;
      hb.appendChild(div);
      hb.scrollTop = hb.scrollHeight;
    }
  } else {
    clearQuote(fromName);
  }

  bodyEl.value = '';
  bodyEl.focus();
}

function doPull(agentName) {
  const roomEl = document.getElementById('h-pull-' + agentName);
  if (!roomEl || !roomEl.value) return;

  const result = pullFromRoom(agentName, roomEl.value);
  if (result.error) {
    const hb = document.getElementById('hb-' + agentName);
    if (hb) {
      const div = document.createElement('div');
      div.className = 'msg error';
      div.innerHTML = `<div class="msg-body">${esc(result.error)}</div>`;
      hb.appendChild(div);
      hb.scrollTop = hb.scrollHeight;
    }
  }
}

function createParticipant() {
  const input = document.getElementById('new-participant-name');
  const name = input.value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!name) return;
  const result = addParticipant(name);
  if (result.error) { alert(result.error); return; }
  input.value = '';
  renderDirectory();
  rebuildGrid();
}

function doRemoveParticipant(name) {
  removeParticipant(name);
  renderDirectory();
  rebuildGrid();
}

function createRoom() {
  const input = document.getElementById('new-room-name');
  const name = input.value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!name) return;
  const result = addRoom(name);
  if (result.error) { alert(result.error); return; }
  input.value = '';
  renderDirectory();
  rebuildGrid();
}

function doRemoveRoom(name) {
  removeRoom(name);
  renderDirectory();
  rebuildGrid();
}

function doJoinRoom(roomName) {
  const select = document.getElementById('add-to-' + roomName);
  if (!select) return;
  joinRoom(select.value, roomName);
  renderDirectory();
  rebuildGrid();
}

function doLeaveRoom(participantName, roomName) {
  leaveRoom(participantName, roomName);
  renderDirectory();
  rebuildGrid();
}

function toggleDirectory() {
  const dir = document.getElementById('directory');
  const btn = document.getElementById('dir-toggle');
  dir.classList.toggle('hidden');
  btn.classList.toggle('active');
}

document.getElementById('new-participant-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') createParticipant();
});
document.getElementById('new-room-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') createRoom();
});
